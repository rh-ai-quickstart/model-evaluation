# Default values for model-evaluation
global:
  imageRegistry: quay.io
  imageRepository: rh-ai-quickstart
  imageTag: latest
  imagePullPolicy: Always
  storageClass: ""

# Model serving configuration
models:
  # MaaS endpoint (shared for all models)
  maasEndpoint: "https://litellm-litemaas.apps.prod.rhoai.rh-aiservices-bu.com"
  # Default models for A/B comparison
  modelA:
    name: "Granite-3.3-8B-Instruct"
    deploymentMode: "maas"
  modelB:
    name: "Llama-4-Scout-17B-16E-W4A16"
    deploymentMode: "maas"
  # Embedding model for RAG pipeline
  embeddingModel: "Nomic-embed-text-v2-moe"
  # Judge model for evaluation metrics (DeepEval) -- must be distinct from A and B
  judgeModel: "Mistral-Small-24B-W8A8"

# Secrets configuration - override with actual secrets
secrets:
  # Database secrets
  POSTGRES_DB: "model-evaluation"
  POSTGRES_USER: "user"
  # IMPORTANT: Change this password before deploying to production!
  POSTGRES_PASSWORD: "CHANGE-ME-BEFORE-PRODUCTION"

  # API secrets
  # IMPORTANT: Update DATABASE_URL if you change POSTGRES_PASSWORD
  DATABASE_URL: "postgresql+asyncpg://user:CHANGE-ME-BEFORE-PRODUCTION@model-evaluation-db:5432/model-evaluation"
  DEBUG: "false"
  ALLOWED_HOSTS: '["*"]'

  # API token (shared MaaS authentication)
  # REQUIRED: You must provide a valid MaaS API token
  API_TOKEN: ""

  # UI secrets
  # OPTIONAL: If not set, will be auto-derived from route configuration
  VITE_API_BASE_URL: ""
  VITE_ENVIRONMENT: "production"

# OpenShift Routes configuration
routes:
  enabled: true
  annotations:
    haproxy.router.openshift.io/timeout: "600s"
  sharedHost: ""
  ui:
    host: ""
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  api:
    host: ""
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

# API configuration
api:
  enabled: true
  name: model-evaluation-api
  image:
    repository: model-evaluation-api
    tag: latest
  service:
    type: ClusterIP
    port: 8000
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  healthCheck:
    enabled: true
    liveness:
      path: /health/live
      initialDelaySeconds: 10
      periodSeconds: 10
    readiness:
      path: /health/ready
      initialDelaySeconds: 15
      periodSeconds: 10

# UI configuration
ui:
  enabled: true
  name: model-evaluation-ui
  image:
    repository: model-evaluation-ui
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  healthCheck:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10

# Database configuration (self-managed pgvector)
database:
  enabled: true
  name: model-evaluation-db
  image:
    repository: pgvector/pgvector
    tag: pg16
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Database migration configuration
migration:
  enabled: true
  name: model-evaluation-migration
  image:
    repository: model-evaluation-api
    tag: latest
  restartPolicy: Never
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# Subchart: pgvector (from ai-architecture-charts)
pgvector:
  enabled: false

# Subchart: llm-service (from ai-architecture-charts)
llm-service:
  enabled: false

# ServiceAccount
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context
podSecurityContext: {}

# Security Context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
